name: Atualizar dados e publicar

on:
  schedule:
    # a cada 2 horas (minuto 17 para fugir dos picos do GitHub)
    - cron: '17 */2 * * *'
  workflow_dispatch:

concurrency:
  group: atualizar
  cancel-in-progress: true

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Dependências
        run: dart pub get

      - name: Atualizar séries e gerar painel
        run: |
          dart run lab_cli:lab update
          dart run lab_cli:lab publish

      - name: Sincronizar portfólio do eToro (privado, Firestore)
        continue-on-error: true  # nunca bloqueia a publicação do painel
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ETORO_KEY_PUBLICA: ${{ secrets.ETORO_KEY_PUBLICA }}
          ETORO_KEY_PRIVADA: ${{ secrets.ETORO_KEY_PRIVADA }}
          ETORO_ENVIRONMENT: ${{ secrets.ETORO_ENVIRONMENT }}
        run: |
          echo "$FIREBASE_SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          dart run lab_cli:lab etoro-sync

      - name: Publicar no Firebase Hosting
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools deploy --only hosting --project quantlab-lde --non-interactive
