name: Diagnóstico eToro

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart pub get

      - name: Testar chaves eToro (só status, sem posições)
        env:
          ETORO_KEY_PUBLICA: ${{ secrets.ETORO_KEY_PUBLICA }}
          ETORO_KEY_PRIVADA: ${{ secrets.ETORO_KEY_PRIVADA }}
          ETORO_ENVIRONMENT: ${{ secrets.ETORO_ENVIRONMENT }}
        run: dart run lab_cli:lab etoro-check

      - name: DEBUG formato da busca (temporário)
        env:
          ETORO_KEY_PUBLICA: ${{ secrets.ETORO_KEY_PUBLICA }}
          ETORO_KEY_PRIVADA: ${{ secrets.ETORO_KEY_PRIVADA }}
          ETORO_ENVIRONMENT: ${{ secrets.ETORO_ENVIRONMENT }}
          ETORO_DEBUG: '1'
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          dart run lab_cli:lab rates
